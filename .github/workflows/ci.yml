name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (fail on high severity)
        run: npm audit --omit=dev --audit-level=high

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Type check
        run: npm run check

      - name: Unit tests
        # No unit tests yet (a11y/e2e coverage lives in the Playwright step below);
        # --passWithNoTests keeps the gate green instead of erroring on an empty run.
        run: npx vitest run --passWithNoTests

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test

  lighthouse:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # lhci autorun starts `npm run preview` (vite preview -> http://localhost:4173),
      # collects Lighthouse runs, and asserts the budgets defined in lighthouserc.json.
      - name: Run Lighthouse CI
        run: npx lhci autorun

  deploy:
    runs-on: ubuntu-latest
    needs: [test, lighthouse]
    # Only deploy on direct pushes to main — never from pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      # Requires the CLOUDFLARE_API_TOKEN repository secret
      # (Settings -> Secrets and variables -> Actions). Without it `wrangler deploy` fails.
      - name: Build and deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm ci && npm run build && npx wrangler deploy
